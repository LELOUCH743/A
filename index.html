<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مريم الزنجية</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1b1528 0%, #09040f 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            position: relative;
        }

        /* تأثير النجوم والمجرة */
        .galaxy {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.6;
            animation: galaxyMove 100s linear infinite;
        }

        @keyframes galaxyMove {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 1100px, 390px 760px, 1130px 1270px; }
        }

        /* سديم أرجواني متوهج خلف البطاقة */
        .nebula {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(142, 68, 173, 0.4) 0%, transparent 70%);
            filter: blur(30px);
            animation: pulse 6s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0.8; }
        }

        /* تصميم البطاقة بالإطار المضيء المتدرج */
        .Para_Ti {
            position: relative;
            width: 85%;
            max-width: 350px;
            height: 250px;
            background: rgba(9, 4, 15, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            /* إطار متوهج ومتدرج الألوان */
            border: 2px solid transparent;
            background-image: linear-gradient(rgba(9, 4, 15, 0.7), rgba(9, 4, 15, 0.7)), 
                              linear-gradient(45deg, #ff4d6d, #8e44ad, #00f2fe);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(234, 76, 137, 0.3);
            z-index: 10;
            padding: 20px;
        }

        /* تنسيق النص المضيء المتوهج Neon */
        .text {
            color: #ffffff;
            font-size: 2.3rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 5px #fff, 
                         0 0 10px #ff4d6d, 
                         0 0 20px #ff4d6d, 
                         0 0 40px #8e44ad;
        }

        /* تأثير القلوب المتساقطة */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            z-index: 5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="galaxy"></div>
    <div class="nebula"></div>

    <div class="Para_Ti">
        <div class="text">مريم الزنجية ❤️</div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            heart.style.left = Math.random() * 100 + 'vw';
            
            const size = Math.random() * 15 + 12;
            heart.style.fontSize = size + 'px';
            
            const duration = Math.random() * 3 + 3;
            heart.style.animationDuration = duration + 's';
            
            heart.style.opacity = Math.random() * 0.7 + 0.3;
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
