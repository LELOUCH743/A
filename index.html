<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى قطوتي</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0518;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* الكرت المتوهج بالنيون */
        .card {
            background: rgba(20, 10, 35, 0.65);
            border: 2px solid #ff2a85;
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 25px #ff2a85, inset 0 0 15px rgba(255, 42, 133, 0.3);
            backdrop-filter: blur(12px);
            transform-style: preserve-3d;
            animation: floatCard 4s ease-in-out infinite;
            z-index: 10;
            max-width: 85%;
        }

        /* تأثير الحركة العائمة للكرت */
        @keyframes floatCard {
            0%, 100% { transform: translateY(0) rotateX(2deg) rotateY(-2deg); }
            50% { transform: translateY(-15px) rotateX(-2deg) rotateY(2deg); }
        }

        /* النص النيوني المتوهج */
        .love-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 10px #ff2a85, 0 0 20px #ff2a85, 0 0 40px #ff73b3;
            letter-spacing: 2px;
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px #ff2a85, 0 0 20px #ff2a85, 0 0 30px #ff73b3; }
            100% { text-shadow: 0 0 15px #ff2a85, 0 0 35px #ff2a85, 0 0 60px #ff73b3, 0 0 80px #ff2a85; }
        }

        /* حاوية مطر القلوب */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: #ff2a85;
            font-size: 1.5rem;
            opacity: 0;
            animation: fall linear infinite;
            text-shadow: 0 0 5px #ff2a85;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="love-text">بحبك يا قطوتي</h1>
    </div>

    <div class="hearts-container" id="heartsContainer"></div>

    <script>
        // توليد مطر القلوب التلقائي
        const container = document.getElementById('heartsContainer');
        const heartShapes = ['❤️', '💖', '✨', '💕', '🐾'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // اختيار شكل عشوائي وموقع عشوائي
            heart.innerText = heartShapes[Math.floor(Math.random() * heartShapes.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            
            // أحجام وسرعات عشوائية لتأثير طبيعي
            const duration = Math.random() * 3 + 3; // بين 3 إلى 6 ثواني
            const size = Math.random() * 1.5 + 1; // أحجام مختلفة
            
            heart.style.animationDuration = duration + 's';
            heart.style.fontSize = size + 'rem';
            
            container.appendChild(heart);

            // حذف القلب بعد انتهاء الحركة
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // إنشاء قلب جديد كل 150 ملي ثانية
        setInterval(createHeart, 150);
    </script>
</body>
</html>
